{% extends "public/base.html" %}
{% block title %}Manage your order — {{ event.event_name }}{% endblock %}
{% block content %}
<section class="band">
  <div class="container-sm">
    <div class="card">
      <h1>Manage your order</h1>
      <p>Enter the email you used to register. We'll send you a one-time link to view and edit your order — no password needed.</p>
      <form method="POST" action="{{ url_for('public.order_login') }}">
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" required autofocus />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Email me a link</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
